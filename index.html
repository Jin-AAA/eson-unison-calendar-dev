<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESON × UNISON Calendar</title>
  <!-- shortcut icon -->
  <link rel="SHORTCUT ICON" href="icons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+KR:wght@100..900&family=Noto+Sans+TC:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f6f5f2" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet" />
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <main class="app-shell">
    <section class="hero-card">
      <div class="hero-copy">
        <h1>ESON × UNISON Calendar</h1>
      </div>

      <div class="hero-actions">
        <div class="language-switch" aria-label="Language switcher">
          <button class="lang-btn" data-lang="en">English</button>
          <button class="lang-btn" data-lang="ko">한국어</button>
          <button class="lang-btn active" data-lang="zh">中文</button>
          <button class="lang-btn" data-lang="ja">日本語</button>
        </div>
        <div class="action-row">
          <button class="ghost-btn" id="notifyBtn" data-i18n="enableNotifications">接收通知</button>
          <button class="icon-btn" id="refreshBtn" aria-label="Refresh" title="Refresh">
            <span class="material-symbols-rounded" aria-hidden="true">autorenew</span>
          </button>
        </div>
      </div>
    </section>

    <section class="meta-row">
      <article class="mini-card today-card">
        <span data-i18n="todayLabel">今天</span>
        <strong id="todayText">—</strong>
      </article>
      <article class="mini-card">
        <span data-i18n="timezoneLabel">偵測時區</span>
        <strong id="timezoneText">—</strong>
      </article>
    </section>

    <section class="calendar-panel">
      <header class="calendar-header">
        <button class="circle-btn" id="prevMonth" aria-label="Previous month"><span class="material-symbols-rounded" aria-hidden="true">chevron_left</span></button>
        <div class="calendar-title-block">
          <p class="section-kicker" data-i18n="calendarKicker">Calendar</p>
          <h2 id="monthTitle">—</h2>
          <div class="calendar-tools">
            <button class="mini-action-btn" id="todayBtn" type="button" data-i18n="todayButton">回到今天</button>
            <button class="mini-action-btn" id="viewToggleBtn" type="button" data-i18n="listMode">列表模式</button>
          </div>
        </div>
        <button class="circle-btn" id="nextMonth" aria-label="Next month"><span class="material-symbols-rounded" aria-hidden="true">chevron_right</span></button>
      </header>

      <div class="weekday-grid" id="weekdayGrid"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="event-list-view" id="eventListView" hidden></div>
    </section>

    <footer class="site-footer">
      <div class="footer-brand">
        <p class="company">제이슨(주)엔터테인먼트</p>
        <p class="credit">web by <span>🍔Jiin🍟UNISON🥤</span></p>
      </div>
      <div class="footer-social">
        <span data-i18n="followEson">follow ESON</span>
        <div class="social-links" aria-label="ESON social links">
          <a href="https://www.instagram.com/kim.eson/" target="_blank" rel="noopener noreferrer" aria-label="ESON Instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm0 2A3.8 3.8 0 0 0 4 7.8v8.4A3.8 3.8 0 0 0 7.8 20h8.4a3.8 3.8 0 0 0 3.8-3.8V7.8A3.8 3.8 0 0 0 16.2 4H7.8Zm4.2 3.1a4.9 4.9 0 1 1 0 9.8 4.9 4.9 0 0 1 0-9.8Zm0 2a2.9 2.9 0 1 0 0 5.8 2.9 2.9 0 0 0 0-5.8Zm5.1-2.25a1.15 1.15 0 1 1 0 2.3 1.15 1.15 0 0 1 0-2.3Z"/></svg>
          </a>
          <a href="https://www.tiktok.com/@callmejasonkim" target="_blank" rel="noopener noreferrer" aria-label="ESON TikTok">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.3 2c.35 3.07 2.1 4.9 5.16 5.1v3.45a8.9 8.9 0 0 1-5.1-1.58v6.52c0 3.3-2.02 6.51-6.43 6.51C5.2 22 3 19.33 3 16.22c0-3.49 2.74-6.25 6.65-6.04.42.02.82.08 1.2.18v3.6a3.4 3.4 0 0 0-1.33-.27c-1.62 0-2.74 1.05-2.74 2.45 0 1.48 1.03 2.43 2.44 2.43 1.63 0 2.57-.94 2.57-3.05V2h3.51Z"/></svg>
          </a>
          <a href="https://www.youtube.com/@KIMESON" target="_blank" rel="noopener noreferrer" aria-label="ESON YouTube">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.58 7.19a2.73 2.73 0 0 0-1.92-1.94C17.96 4.8 12 4.8 12 4.8s-5.96 0-7.66.45a2.73 2.73 0 0 0-1.92 1.94A28.5 28.5 0 0 0 2 12a28.5 28.5 0 0 0 .42 4.81 2.73 2.73 0 0 0 1.92 1.94c1.7.45 7.66.45 7.66.45s5.96 0 7.66-.45a2.73 2.73 0 0 0 1.92-1.94A28.5 28.5 0 0 0 22 12a28.5 28.5 0 0 0-.42-4.81ZM10 15.2V8.8l5.2 3.2L10 15.2Z"/></svg>
          </a>
        </div>
      </div>
    </footer>
  </main>

  <dialog class="event-modal" id="eventModal">
    <button class="modal-close" id="closeModal" aria-label="Close"><span class="material-symbols-rounded" aria-hidden="true">close</span></button>
    <p class="modal-date" id="modalDate">—</p>
    <h3 id="modalTitle">—</h3>
    <p class="modal-time" id="modalTime">—</p>
    <p class="modal-desc" id="modalDesc">—</p>
    <div class="modal-tags" id="modalTags"></div>
  </dialog>

  <dialog class="app-modal" id="appModal">
    <button class="modal-close app-modal-close" id="appModalClose" aria-label="Close"><span class="material-symbols-rounded" aria-hidden="true">close</span></button>
    <h3 id="appModalTitle">—</h3>
    <p id="appModalMessage">—</p>
    <button class="ghost-btn app-modal-ok" id="appModalOk" type="button">知道了</button>
  </dialog>


  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
